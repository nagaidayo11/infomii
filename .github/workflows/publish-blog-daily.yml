name: Publish Blog Daily

on:
  schedule:
    # Daily at 10:00 JST
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  publish-next-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish due scheduled post
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          result="$(node scripts/publish-scheduled-blog.mjs)"
          echo "$result"
          echo "$result" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.publish.outputs.published == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git add content/blog
          git commit -m "chore(blog): publish scheduled post"
          git push origin HEAD:main
