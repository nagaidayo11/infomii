name: Publish Blog Daily

on:
  schedule:
    # スクリプトの「今日」は Asia/Tokyo。記事公開の目安時刻は日本時間 10:00。
    # メイン: 01:00 UTC = 10:00 JST（東京は夏時間なしのためこの対応は年間固定）
    - cron: "0 1 * * *"
    # バックアップ: Actions のキュー遅延で上記がずれたときの同日リトライ（02:30 UTC = 11:30 JST）
    # 処理は同日・同一コミットの二重実行で no-op（既に移送済みなら published=false）
    - cron: "30 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-next-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish due scheduled posts
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          node scripts/publish-scheduled-blog.mjs 2>&1 | tee publish.log
          if grep -qx "published=true" publish.log; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.publish.outputs.published == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git add content/blog
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(blog): publish scheduled post(s)"
          git push origin HEAD:main
