name: Publish Blog Daily

on:
  schedule:
    # Daily at 10:00 JST
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  publish-next-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish due scheduled posts
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          node scripts/publish-scheduled-blog.mjs 2>&1 | tee publish.log
          if grep -qx "published=true" publish.log; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.publish.outputs.published == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git add content/blog
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(blog): publish scheduled post(s)"
          git push origin HEAD:main
